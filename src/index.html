<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Converter</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2f4f8" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Converter" />
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="64x64" href="assets/pwa-64x64.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link
      rel="preload"
      href="assets/fonts/sora-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="assets/fonts/jetbrains-mono-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <app-root>
      <div
        aria-hidden="true"
        style="
          display: flex;
          flex-direction: column;
          height: 100dvh;
          padding: 12px 16px 8px;
          gap: 10px;
          position: relative;
          z-index: 1;
        "
      >
        <div style="flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0">
          <div style="height: 32px"></div>
          <div
            style="
              height: 56px;
              border: 1px solid var(--color-border);
              border-radius: 16px;
              background: var(--color-surface);
            "
          ></div>
          <div
            style="
              height: 56px;
              border: 1px solid var(--color-border);
              border-radius: 16px;
              background: var(--color-surface);
            "
          ></div>
          <div style="display: flex; align-items: center; gap: 8px">
            <div
              style="
                flex: 1;
                height: 44px;
                border: 1px solid var(--color-border);
                border-radius: 12px;
                background: var(--color-surface);
              "
            ></div>
            <div
              style="
                width: 44px;
                height: 44px;
                border: 1px solid var(--color-border);
                border-radius: 50%;
              "
            ></div>
            <div
              style="
                flex: 1;
                height: 44px;
                border: 1px solid var(--color-border);
                border-radius: 12px;
                background: var(--color-surface);
              "
            ></div>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); height: 320px"></div>
      </div>
    </app-root>
  </body>
</html>
